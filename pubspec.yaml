name: comand_ia
description: >
  Comandas multiplataforma + analítica para locales gastronómicos micro.
  Proyecto académico — Electivo Profesional · ICCI · UCEN · 2026-S1.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # Local persistence (offline-first)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # Observability
  sentry_flutter: ^8.13.0

  # Utilities
  equatable: ^2.0.7
  intl: ^0.19.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^7.0.0

  # Code generation
  riverpod_generator: ^2.6.4
  riverpod_lint: ^2.6.4
  build_runner: ^2.4.14
  drift_dev: ^2.23.1

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
